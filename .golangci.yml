version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - nilerr
    - revive

  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - staticcheck
      # Existing tech debt — exclude pre-existing violations so the config
      # catches new issues without blocking on legacy code.
      - path: internal/clients/identity\.go
        linters:
          - errcheck
          - gosec
      - path: internal/http/router\.go
        linters:
          - errcheck
      - path: cmd/agent-mcp/main\.go
        linters:
          - gocritic
      - path: internal/agentmcp/tools_lifecycle\.go
        linters:
          - gocritic
      - linters:
          - revive
        text: "exported: exported"
