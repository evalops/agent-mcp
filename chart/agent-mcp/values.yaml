image:
  repository: ghcr.io/evalops/agent-mcp
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  addr: ":8080"
  identityBaseURL: ""
  registryBaseURL: ""
  governanceBaseURL: ""
  approvalsBaseURL: ""
  meterBaseURL: ""
  memoryBaseURL: ""
  environment: production
  version: "0.1.0"

session:
  store: memory
  reapInterval: 30s
  redis:
    url: ""
    existingSecretName: ""
    existingSecretKey: SESSION_REDIS_URL

nats:
  url: ""
  existingSecretName: ""
  existingSecretKey: NATS_URL
  stream: agent_mcp_events
  subjectPrefix: agent-mcp.events

breaker:
  failureThreshold: 5
  resetTimeout: 30s

resources: {}
