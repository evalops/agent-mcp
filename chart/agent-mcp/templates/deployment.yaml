apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: agent-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-mcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-mcp
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: agent-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: ADDR
              value: {{ .Values.env.addr | quote }}
            - name: IDENTITY_BASE_URL
              value: {{ .Values.env.identityBaseURL | quote }}
            - name: REGISTRY_BASE_URL
              value: {{ .Values.env.registryBaseURL | quote }}
            - name: GOVERNANCE_BASE_URL
              value: {{ .Values.env.governanceBaseURL | quote }}
            - name: APPROVALS_BASE_URL
              value: {{ .Values.env.approvalsBaseURL | quote }}
            - name: METER_BASE_URL
              value: {{ .Values.env.meterBaseURL | quote }}
            - name: MEMORY_BASE_URL
              value: {{ .Values.env.memoryBaseURL | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: VERSION
              value: {{ .Values.env.version | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
