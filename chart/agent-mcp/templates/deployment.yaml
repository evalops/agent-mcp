apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: agent-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if and (eq .Values.session.store "redis") .Values.session.redis.url .Values.session.redis.existingSecretName }}
{{- fail "set only one of session.redis.url or session.redis.existingSecretName when session.store=redis" }}
{{- end }}
{{- if and (eq .Values.session.store "redis") (not .Values.session.redis.url) (not .Values.session.redis.existingSecretName) }}
{{- fail "session.store=redis requires either session.redis.url or session.redis.existingSecretName" }}
{{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-mcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-mcp
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: agent-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: ADDR
              value: {{ .Values.env.addr | quote }}
            - name: IDENTITY_BASE_URL
              value: {{ .Values.env.identityBaseURL | quote }}
            - name: REGISTRY_BASE_URL
              value: {{ .Values.env.registryBaseURL | quote }}
            - name: GOVERNANCE_BASE_URL
              value: {{ .Values.env.governanceBaseURL | quote }}
            - name: APPROVALS_BASE_URL
              value: {{ .Values.env.approvalsBaseURL | quote }}
            - name: METER_BASE_URL
              value: {{ .Values.env.meterBaseURL | quote }}
            - name: MEMORY_BASE_URL
              value: {{ .Values.env.memoryBaseURL | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: VERSION
              value: {{ .Values.env.version | quote }}
            - name: SESSION_STORE
              value: {{ .Values.session.store | quote }}
            - name: SESSION_REAP_INTERVAL
              value: {{ .Values.session.reapInterval | quote }}
            - name: BREAKER_FAILURE_THRESHOLD
              value: {{ .Values.breaker.failureThreshold | quote }}
            - name: BREAKER_RESET_TIMEOUT
              value: {{ .Values.breaker.resetTimeout | quote }}
            {{- if eq .Values.session.store "redis" }}
            - name: SESSION_REDIS_URL
              {{- if .Values.session.redis.existingSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.session.redis.existingSecretName | quote }}
                  key: {{ .Values.session.redis.existingSecretKey | quote }}
              {{- else }}
              value: {{ .Values.session.redis.url | quote }}
              {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
