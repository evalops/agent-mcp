name: GHCR Publish

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ghcr-publish-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/evalops/agent-mcp

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: evalops/service-runtime/.github/actions/publish-ghcr-image@aedb2021c693c5194c81c710b89e63c9340bfdc8
        with:
          image_name: ${{ env.IMAGE_NAME }}
          github_actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dockerfile: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
